name: Build & Deploy OTA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Install Apple Certificate
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          echo -n "$P12_BASE64" | base64 --decode > $CERTIFICATE_PATH
          security create-keychain -p "112233" $RUNNER_TEMP/build.keychain
          security default-keychain -s $RUNNER_TEMP/build.keychain
          security unlock-keychain -p "112233" $RUNNER_TEMP/build.keychain
          security import $CERTIFICATE_PATH -k $RUNNER_TEMP/build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "112233" $RUNNER_TEMP/build.keychain

      - name: Install Provisioning Profile
        env:
          PROVISION_BASE64: ${{ secrets.PROVISION_BASE64 }}
        run: |
          PROFILE_PATH=$RUNNER_TEMP/MineScanner_AdHoc_Profile.mobileprovision
          echo -n "$PROVISION_BASE64" | base64 --decode > $PROFILE_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PROFILE_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build Archive
        run: |
          xcodebuild -project HeapScanV2.xcodeproj \
            -scheme HeapScanV2 \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $RUNNER_TEMP/HeapScanV2.xcarchive \
            PROVISIONING_PROFILE_SPECIFIER=MineScanner_AdHoc_Profile \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            archive

      - name: Export IPA
        run: |
          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.maaden.minescanner.v2</key>
              <string>MineScanner_AdHoc_Profile</string>
            </dict>
          </dict>
          </plist>
          EOF
          
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/HeapScanV2.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist ExportOptions.plist
          
          cp $RUNNER_TEMP/export/HeapScanV2.ipa HeapScanV2.ipa

      - name: Generate Manifest
        run: |
          IPA_URL="https://simba1421.github.io/heapscanv2-ota/HeapScanV2.ipa"
          IPA_SIZE=$(stat -f%z HeapScanV2.ipa)
          
          cat > manifest.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>items</key>
            <array>
              <dict>
                <key>assets</key>
                <array>
                  <dict>
                    <key>kind</key>
                    <string>software-package</string>
                    <key>url</key>
                    <string>${IPA_URL}</string>
                  </dict>
                </array>
                <key>metadata</key>
                <dict>
                  <key>bundle-identifier</key>
                  <string>com.maaden.minescanner.v2</string>
                  <key>bundle-version</key>
                    <string>3.0.0</string>
                  <key>kind</key>
                  <string>software</string>
                  <key>title</key>
                  <string>HeapScan V2</string>
                </dict>
              </dict>
            </array>
          </dict>
          </plist>
          EOF

      - name: Deploy to OTA
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.OTA_TOKEN }}
          external_repository: SIMBA1421/heapscanv2-ota
          publish_branch: master
          publish_dir: ./
          keep_files: false
