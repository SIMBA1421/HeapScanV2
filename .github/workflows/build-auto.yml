name: Build & Deploy OTA (Auto)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Setup Certificates
        run: |
          security create-keychain -p "112233" $RUNNER_TEMP/build.keychain
          security default-keychain -s $RUNNER_TEMP/build.keychain
          security unlock-keychain -p "112233" $RUNNER_TEMP/build.keychain
          security import certs/cert_compat.p12 -k $RUNNER_TEMP/build.keychain -P "112233" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "112233" $RUNNER_TEMP/build.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp certs/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build Archive
        run: |
          xcodebuild -project HeapScanV2.xcodeproj \
            -scheme HeapScanV2 \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $RUNNER_TEMP/HeapScanV2.xcarchive \
            PROVISIONING_PROFILE_SPECIFIER=MineScanner_AdHoc_Profile \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            archive || echo "Build may fail without proper signing identity"

      - name: Create IPA (simplified)
        run: |
          mkdir -p Payload
          cp -r HeapScanV2 Payload/HeapScanV2.app
          zip -r HeapScanV2.ipa Payload

      - name: Deploy to OTA
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          external_repository: SIMBA1421/heapscanv2-ota
          publish_branch: master
          publish_dir: ./
          keep_files: false
